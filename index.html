<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Tanisha 💖</title>
<style>
body {
  margin: 0;
  padding: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
  overflow: hidden;
}

h1 {
  font-size: 40px;
  margin-top: 20%;
  animation: glow 2s infinite alternate;
}

p {
  font-size: 20px;
}

@keyframes glow {
  from { text-shadow: 0 0 10px pink; }
  to { text-shadow: 0 0 30px red; }
}

.heart {
  position: absolute;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<h1>Happy Birthday Tanisha 💖</h1>
<p>You are not just my best friend... you are my favorite person 😏✨</p>
<p>Stay amazing, stay beautiful... and always stay mine 💕🔥</p>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
